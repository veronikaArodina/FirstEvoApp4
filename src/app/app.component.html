<h3>*ngFor</h3>
<ul>
    <li [id]="surname.name" *ngFor="let surname of array_surname">{{surname.name}}</li>
</ul>
<h3>Pipe</h3>
<p><b>Pipe Date (DD/MM/YYYY):</b> {{date_now | date: 'dd.MM.yyyy'}}</p>
<h3>My Pipe</h3>
<p>25 + 5 = {{ 25 | firstPipe }}</p>
<p>42 + 5 = {{ 42 | firstPipe }}</p>
<p>{{number}} + 5 = {{number | firstPipe}}</p>
